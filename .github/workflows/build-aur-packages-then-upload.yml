name: Build AUR Packages and Upload to SourceForge
on:
  workflow_dispatch:
jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_GITHUB_ACTIONS }}" > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key
          ssh-keyscan -t rsa,ed25519 frs.sourceforge.net >> ~/.ssh/known_hosts

      - name: Create temporary build user
        run: |
          sudo useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/builduser

      - name: Clone repository
        run: |
          sudo -u builduser git clone https://github.com/RengeOS/NiriWM-Edition /home/builduser/NiriWM-Edition
          sudo chown -R builduser:builduser /home/builduser/NiriWM-Edition

      - name: Run build-aur.sh
        run: |
          sudo -u builduser bash -c "cd /home/builduser/NiriWM-Edition && ./build-aur.sh --all"

      - name: Create Packages-AUR if not exists
        run: |
          sudo -u builduser mkdir -p /home/builduser/NiriWM-Edition/Packages-AUR

      - name: Run makerepo.sh
        run: |
          sudo -u builduser bash -c "cd /home/builduser/NiriWM-Edition && ./makerepo.sh"

      - name: Upload packages to SourceForge
        run: |
          cp ~/.ssh/sf_key /tmp/sf_key
          chmod 600 /tmp/sf_key
          cd /home/builduser/NiriWM-Edition/Packages-AUR
          for file in *; do
            [ -f "$file" ] && scp -i /tmp/sf_key "$file" crystalforceix@frs.sourceforge.net:/home/frs/project/rengeos/RengeOS-Hosting-Repo/Packages/x86_64/
          done

      - name: Summary
        run: |
          echo "## Uploaded Packages" >> $GITHUB_STEP_SUMMARY
          for file in /home/builduser/NiriWM-Edition/Packages-AUR/*; do
            [ -f "$file" ] && echo "- $(basename "$file")" >> $GITHUB_STEP_SUMMARY
          done

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/sf_key /tmp/sf_key
          sudo userdel -r builduser 2>/dev/null || true
