name: Build AUR Packages and Upload to SourceForge
on:
  workflow_dispatch:
jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git openssh sudo base-devel
          echo 'PACMAN_AUTH=(sudo)' >> /etc/makepkg.conf
          sed -i 's/^#PACMAN_OPTS=/PACMAN_OPTS=/' /etc/makepkg.conf
          echo 'PACMAN_OPTS="--noconfirm"' >> /etc/makepkg.conf

      - name: Setup SSH
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.SF_GITHUB_ACTIONS }}" > /root/.ssh/sf_key
          chmod 600 /root/.ssh/sf_key
          ssh-keyscan -t rsa,ed25519 frs.sourceforge.net >> /root/.ssh/known_hosts

      - name: Create temporary build user
        run: |
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers.d/builduser

      - name: Clone repository
        run: |
          sudo -u builduser git clone https://github.com/RengeOS/NiriWM-Edition /home/builduser/NiriWM-Edition
          chown -R builduser:builduser /home/builduser/NiriWM-Edition

      - name: Run build-aur.sh
        run: |
          sudo -u builduser bash -c "cd /home/builduser/NiriWM-Edition && PACMAN_OPTS='--noconfirm' ./build-aur.sh --all"

      - name: Create Packages-AUR if not exists
        run: |
          sudo -u builduser mkdir -p /home/builduser/NiriWM-Edition/Packages-AUR

      - name: Run makerepo.sh
        run: |
          sudo -u builduser bash -c "cd /home/builduser/NiriWM-Edition && PACMAN_OPTS='--noconfirm' ./makerepo.sh"

      - name: Upload packages to SourceForge
        run: |
          PACKAGES_DIR="/home/builduser/NiriWM-Edition/Packages-AUR"
          shopt -s nullglob
          files=("$PACKAGES_DIR"/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No files found in $PACKAGES_DIR"
            exit 0
          fi
          for file in "${files[@]}"; do
            [ -f "$file" ] && scp -i /root/.ssh/sf_key \
              -o StrictHostKeyChecking=no \
              "$file" \
              crystalforceix@frs.sourceforge.net:/home/frs/project/rengeos/RengeOS-Hosting-Repo/Packages/x86_64/
          done

      - name: Summary
        run: |
          echo "## Uploaded Packages" >> $GITHUB_STEP_SUMMARY
          PACKAGES_DIR="/home/builduser/NiriWM-Edition/Packages-AUR"
          shopt -s nullglob
          for file in "$PACKAGES_DIR"/*; do
            [ -f "$file" ] && echo "- $(basename "$file")" >> $GITHUB_STEP_SUMMARY
          done

      - name: Cleanup
        if: always()
        run: |
          rm -f /root/.ssh/sf_key
          userdel -r builduser 2>/dev/null || true
